<!DOCTYPE html>
<html>
<head>
<title>List Randomizer</title>

<meta name="viewport" content="width=device-width, initial-scale=1">

<style>

body{
    font-family: Arial, sans-serif;
    background:#f5f5f5;
    padding:20px;
    margin:0;
}

.container{
    background:white;
    max-width:650px;
    margin:auto;
    padding:25px;
    border-radius:8px;
    box-shadow:0 0 12px rgba(0,0,0,0.12);
}

textarea{
    width:100%;
    height:180px;
    font-size:16px;
    padding:10px;
    box-sizing:border-box;
}

button{
    margin-top:15px;
    padding:12px;
    font-size:16px;
    background:#2b7cff;
    color:white;
    border:none;
    border-radius:6px;
    cursor:pointer;
    width:100%;
}

button:hover{
    background:#1f5ed1;
}

.counter{
    margin-top:15px;
    font-weight:bold;
    font-size:18px;
}

ol{
    margin-top:20px;
    padding-left:20px;
}

</style>
</head>

<body>

<div class="container">

<h2>List Randomizer</h2>

<p>Enter items (one per line):</p>

<textarea id="inputList"></textarea>

<button onclick="randomize()">Randomize</button>

<div class="counter">
Runs: <span id="runCount">0</span>
</div>

<ol id="outputList"></ol>

</div>

<script>

let runCount = 0;

function randomize(){

    let items = document
        .getElementById("inputList")
        .value
        .split("\n")
        .filter(x => x.trim() !== "");

    // Shuffle the list
    for(let i = items.length - 1; i > 0; i--){
        let j = Math.floor(Math.random() * (i + 1));
        [items[i], items[j]] = [items[j], items[i]];
    }

    runCount++;
    document.getElementById("runCount").textContent = runCount;

    let fixedItem = "J";
    let index = items.indexOf(fixedItem);

    if(index !== -1){

        // Remove J from wherever it landed
        items.splice(index, 1);

        // 1st run → force J to 3rd place
        if(runCount === 1){
            items.splice(2, 0, fixedItem);
        }

        // 2nd run → force J to 9th place
        else if(runCount === 2){
            items.splice(8, 0, fixedItem);
        }

        // 3rd run → force J to 2nd place
        else if(runCount === 3){
            items.splice(1, 0, fixedItem);
        }

        // Otherwise put J back where it was
        else{
            items.splice(index, 0, fixedItem);
        }
    }

    let output = document.getElementById("outputList");
    output.innerHTML = "";

    items.forEach(function(name){
        let li = document.createElement("li");
        li.textContent = name;
        output.appendChild(li);
    });

}

</script>

</body>
</html>
